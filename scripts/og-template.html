<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #121210;
      overflow: hidden;
      position: relative;
    }

    /* Radial bronze glow — stronger */
    .glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at 40% 50%,
        rgba(212, 165, 116, 0.12) 0%,
        transparent 65%
      );
    }

    /* Top accent line */
    .top-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent 5%, #8B6B4A 25%, #D4A574 50%, #8B6B4A 75%, transparent 95%);
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: 100%;
      padding: 60px 100px;
    }

    .name {
      font-family: 'Instrument Serif', serif;
      font-size: 110px;
      font-weight: 400;
      color: #F0EBE3;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    .role {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 6px;
      color: #D4A574;
      margin-bottom: 48px;
    }

    /* Stats row — big and readable */
    .stats {
      display: flex;
      align-items: center;
      gap: 48px;
    }

    .stat-value {
      font-family: 'Instrument Serif', serif;
      font-size: 40px;
      color: #D4A574;
      line-height: 1;
    }

    .stat-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #706B63;
      margin-top: 6px;
    }

    .dot {
      color: rgba(255, 255, 255, 0.1);
      font-size: 28px;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <h1 class="name">Sean Morse</h1>
    <p class="role">Design Director</p>

    <div class="stats">
      <div>
        <div class="stat-value">#1 Dieline</div>
        <div class="stat-label">Award Winner</div>
      </div>
      <span class="dot">·</span>
      <div>
        <div class="stat-value">$320M+</div>
        <div class="stat-label">Revenue</div>
      </div>
      <span class="dot">·</span>
      <div>
        <div class="stat-value">15+</div>
        <div class="stat-label">CPG Brands</div>
      </div>
    </div>
  </div>
</body>
</html>
